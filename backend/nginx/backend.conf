# ============================================================
# FOTA 智能诊断平台 - Backend Nginx 配置
# ============================================================
# 安装步骤：
# 1. sudo cp nginx/backend.conf /etc/nginx/sites-available/
# 2. sudo ln -s /etc/nginx/sites-available/backend.conf /etc/nginx/sites-enabled/
# 3. sudo nginx -t
# 4. sudo systemctl reload nginx

# ── HTTPS 服务 ──
server {
    listen 443 ssl http2;
    server_name fota-api.example.com;

    # SSL 证书配置
    # 选项 A：Let's Encrypt（推荐用于国内服务器）
    # ssl_certificate /etc/letsencrypt/live/fota-api.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/fota-api.example.com/privkey.pem;
    
    # 选项 B：Cloudflare Origin Certificate（推荐用于海外服务器）
    ssl_certificate /etc/nginx/ssl/origin-cert.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── 安全头 ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ── 日志配置 ──
    access_log /var/log/nginx/fota-backend-access.log;
    error_log /var/log/nginx/fota-backend-error.log warn;

    # ── 客户端上传限制 ──
    client_max_body_size 100M;  # 允许上传大日志包

    # ── FastAPI 反向代理 ──
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        
        # 请求头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持（用于 Case 状态推送）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # SSE 流式响应支持（用于诊断流式输出）
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        
        # 长连接优化
        proxy_connect_timeout 10s;
        keepalive_timeout 300s;
    }

    # ── 健康检查端点（不记录日志）──
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }

    # ── API 文档（生产环境可选择性关闭）──
    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
    }

    location /redoc {
        proxy_pass http://127.0.0.1:8000/redoc;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
    }

    # ── 静态文件（如果有）──
    location /static/ {
        alias /opt/fota-backend/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# ── HTTP → HTTPS 重定向 ──
server {
    listen 80;
    server_name fota-api.example.com;
    return 301 https://$host$request_uri;
}

