# ============================================================
# FOTA 智能诊断平台 - LiteLLM Gateway Nginx 配置
# ============================================================
# 安装步骤：
# 1. sudo cp nginx/litellm.conf /etc/nginx/sites-available/
# 2. sudo ln -s /etc/nginx/sites-available/litellm.conf /etc/nginx/sites-enabled/
# 3. sudo nginx -t
# 4. sudo systemctl reload nginx

# ── HTTPS 服务（使用 Cloudflare Origin Certificate）──
server {
    listen 443 ssl http2;
    server_name llm-proxy.example.com;

    # Cloudflare Origin Certificate（15 年有效，免续签）
    # 在 Cloudflare Dashboard 生成：SSL/TLS → Origin Server → Create Certificate
    ssl_certificate     /etc/nginx/ssl/origin-cert.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ── 仅允许 Cloudflare IP 访问（防止绕过 CDN 直连源站）──
    # Cloudflare IPv4 列表：https://www.cloudflare.com/ips-v4
    allow 173.245.48.0/20;
    allow 103.21.244.0/22;
    allow 103.22.200.0/22;
    allow 103.31.4.0/22;
    allow 141.101.64.0/18;
    allow 108.162.192.0/18;
    allow 190.93.240.0/20;
    allow 188.114.96.0/20;
    allow 197.234.240.0/22;
    allow 198.41.128.0/17;
    allow 162.158.0.0/15;
    allow 104.16.0.0/13;
    allow 104.24.0.0/14;
    allow 172.64.0.0/13;
    allow 131.0.72.0/22;
    deny all;

    # ── 获取客户端真实 IP（Cloudflare 代理后）──
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # ── LiteLLM API 反向代理 ──
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";          # 长连接
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming SSE 支持（关键！）
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;                 # LLM 长输出超时
        
        # 长连接优化
        proxy_connect_timeout 10s;
        keepalive_timeout 300s;
    }

    # ── LiteLLM Admin UI ──
    location /ui {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── 健康检查端点 ──
    location /health {
        proxy_pass http://127.0.0.1:4000/health;
        access_log off;
    }

    # ── 日志配置 ──
    access_log /var/log/nginx/litellm-access.log;
    error_log /var/log/nginx/litellm-error.log warn;
}

# ── HTTP → HTTPS 重定向（Cloudflare 也会自动做，这里是双保险）──
server {
    listen 80;
    server_name llm-proxy.example.com;
    return 301 https://$host$request_uri;
}
